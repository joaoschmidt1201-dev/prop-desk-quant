name: Tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: pip install --quiet -r requirements-dev.txt

      - name: Run tests (skip slow + network)
        run: pytest -m "not slow and not network" --tb=short
