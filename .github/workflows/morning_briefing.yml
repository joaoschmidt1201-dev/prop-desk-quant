name: Morning Briefing

on:
  workflow_dispatch:
    # Permite disparo manual pela aba GitHub Actions (útil para testes)
  schedule:
    # 09:15 UTC = 6:15 BRT — ~4h15 antes da abertura do mercado US (13:30 UTC / 10:30 BRT, EDT).
    # O scheduler do GitHub Actions NÃO garante o horário: enfileira e atrasa crons
    # em janelas de pico, sendo a faixa 11:00–12:00 UTC e o topo da hora as piores.
    # A defesa não é o minuto exato, é o BUFFER: às 09:15 UTC + minuto ímpar off-peak,
    # mesmo um atraso de 2h ainda dispara bem antes da abertura.
    - cron: '15 9 * * 1-5'

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance requests pandas pytz

      - name: Run Morning Briefing
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/morning_briefing.py
