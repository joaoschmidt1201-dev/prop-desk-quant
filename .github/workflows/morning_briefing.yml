name: Morning Briefing

on:
  workflow_dispatch:
    # Permite disparo manual pela aba GitHub Actions (útil para testes)
  schedule:
    # 11:00 UTC = 8:00 BRT — 2.5h antes da abertura do mercado (10:30 BRT)
    # Mesmo com 2h de delay do GitHub, chega às 10:00 BRT no pior caso
    - cron: '0 11 * * 1-5'

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance requests pandas pytz

      - name: Run Morning Briefing
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/morning_briefing.py
