name: Morning Briefing

on:
  workflow_dispatch:
    # PRIMARY: disparado pelo cron-job.org às 12:30 UTC (9:30 BRT) via GitHub API
    # POST https://api.github.com/repos/joaoschmidt1201-dev/prop-desk-quant/actions/workflows/morning_briefing.yml/dispatches
    # Body: {"ref":"main"} — executa em <2 min → briefing às ~9:32-9:40 BRT (50+ min antes da abertura)
  schedule:
    # BACKUP: só dispara se o cron-job.org falhar
    # 11:00 UTC = 8:00 BRT — ainda pré-market, garante que o briefing saia de qualquer forma
    - cron: '0 11 * * 1-5'

jobs:
  morning-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance requests pandas pytz

      - name: Run Morning Briefing
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/morning_briefing.py
