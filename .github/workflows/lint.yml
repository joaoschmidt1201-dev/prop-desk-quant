name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Ruff check
        run: ruff check scripts/

      - name: Ruff format check
        run: ruff format --check scripts/
